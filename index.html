<script type="text/javascript" src="assets/data.js"></script> 
<script>
let output = "";
//let blockIndex = 0;
header("National Dex");
outputNationalDex();
// header("Alt Forms");
// outputAltForm("Alolan");
document.getElementById("container").innerHTML = output;
function header(title) {
    output += `<div class="row"><div class="col"><h1>` + title + `</h1></div></div>`;
}
function outputNationalDex() {
    let boxIndex = 0;
    output += `<div class="row row-cols-3 g-5"><div class="col"><div class="box row row-cols-6">`;
    pokemon.forEach(outputDexItems);
    function outputDexItems(pokemon, index) {
        
      function formatDexNumber(num) {
        let insetNum = num;
        return insetNum.toString().padStart(4, '0');
      }
      
      function imagePathFor(name) {
        var lowercasePokemonName = pokemon.name.toLowerCase()
          .replace(/♀/g, '-m')
          .replace(/♂/g, '-f')
          .replace(/’/g, '')
          .replace(/\./g, '')
          .replace(/é/g, 'e')
          .replace(/:/g, '')
          .replace(/\s+/g, '-');
        return "assets/images/" + lowercasePokemonName + ".webp";
      }
        
      if ((boxIndex) % 30 === 0) {
        if (boxIndex != 0) {
          output += `</div></div><div class="col"><div class="box row row-cols-6">`;
        }
        output += `<div class="col-12 box-title text-center"><h2><span>` + formatDexNumber(boxIndex+1) + ` - ` + formatDexNumber(boxIndex+30) + `</span></h2></div>`;
      }
        
      output += `<div class="col" style="padding-left:0em; padding-right:0em;"><div class="card text-center"><img src="` + imagePathFor(pokemon.name) + `" class="card-img-top mx-auto d-block w-75" alt="` + pokemon.name + `"><div class="card-body" style="padding: 0.5em 0em 0.5em 0em;"><h5 class="card-title" style="font-size:1em;">` + formatDexNumber(pokemon.number) + `</h5><h6 class="card-subtitle text-body-secondary text-center" style="font-size:0.6em;">` + pokemon.name + `</h6></div></div></div>`;
      boxIndex++;
      //subBlockIndex++;
    }
    let endBlankBlocks = 30 - (pokemon.length % 30);
    for (let i = 0; i < endBlankBlocks; i++) {
      output += `<div class="col"></div>`;
    }
    output += `</div>`;
}
